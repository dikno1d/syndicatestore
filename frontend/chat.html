<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Chat | SYndicate Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    html, body { height: 100%; }
    .chat-page { padding-top: 80px; min-height: calc(100vh - 80px); display: flex; flex-direction: column; }
    .chat-page-container { flex: 1; max-width: 800px; margin: 0 auto; padding: 0 25px 25px; width: 100%; display: flex; flex-direction: column; }
    .chat-page-card { flex: 1; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; }
    .chat-page-header { padding: 20px 24px; background: linear-gradient(135deg, var(--primary-neon), var(--secondary-neon)); color: var(--text-dark); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .chat-page-header h1 { font-family: var(--font-display); font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
    .chat-page-status { font-size: 0.8rem; opacity: 0.8; }
    .chat-page-messages { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }
    .chat-page-input-wrap { display: flex; padding: 14px 20px; gap: 10px; border-top: 1px solid var(--border-color); background: var(--bg-card); flex-shrink: 0; }
    .chat-page-input { flex: 1; background: var(--bg-body); border: 1px solid var(--border-color); border-radius: 20px; padding: 12px 18px; color: var(--text-light); font-size: 0.9rem; outline: none; }
    .chat-page-input:focus { border-color: var(--primary-neon); }
    .chat-page-send { width: 44px; height: 44px; border-radius: 50%; background: var(--primary-neon); border: none; color: var(--text-dark); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; transition: var(--transition-smooth); flex-shrink: 0; }
    .chat-page-send:hover { background: var(--secondary-neon); }
    .chat-page-loading { text-align: center; padding: 60px 20px; color: var(--text-gray); }
    .chat-page-empty { text-align: center; padding: 60px 20px; color: var(--text-gray); }
    .chat-page-empty h3 { font-family: var(--font-display); margin-bottom: 8px; }
    .chat-page-login { text-align: center; padding: 60px 20px; display: none; }
    .chat-page-login h3 { font-family: var(--font-display); margin-bottom: 12px; }
    .chat-page-login p { color: var(--text-gray); margin-bottom: 20px; }
    .chat-msg { max-width: 80%; padding: 12px 16px; border-radius: 14px; font-size: 0.9rem; line-height: 1.5; word-wrap: break-word; }
    .chat-msg.customer { align-self: flex-end; background: var(--primary-neon); color: var(--text-dark); border-bottom-right-radius: 4px; }
    .chat-msg.admin { align-self: flex-start; background: var(--bg-card-hover); color: var(--text-light); border-bottom-left-radius: 4px; }
    .chat-msg-meta { font-size: 0.7rem; opacity: 0.6; margin-top: 6px; }
    .chat-page-nav { display: flex; align-items: center; gap: 20px; }
    .chat-page-nav a { color: var(--text-light); text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; gap: 6px; }
    .chat-page-nav a:hover { color: var(--primary-neon); }
    @media (max-width: 600px) { .chat-page { padding-top: 70px; } .chat-page-container { padding: 0 15px 15px; } .chat-page-messages { padding: 16px; } .chat-page-header { padding: 16px 18px; } .chat-page-input-wrap { padding: 12px 14px; } }
  </style>
</head>
<body>
  <div class="glow-bg"></div>
  <header class="navbar-header" id="navbar">
    <div class="nav-container">
      <a href="/" class="logo-brand">
        <i class="fa-solid fa-gamepad logo-icon"></i>
        <span class="brand-font">SYNDICATE<span class="gradient-text">STORE</span></span>
      </a>
      <nav class="chat-page-nav">
        <a href="/"><i class="fa-solid fa-arrow-left"></i> Back to Store</a>
      </nav>
    </div>
  </header>

  <section class="chat-page">
    <div class="chat-page-container">
      <div class="chat-page-card">
        <div class="chat-page-header">
          <h1><i class="fa-solid fa-comment-dots"></i> Live Chat</h1>
          <span class="chat-page-status"><i class="fa-solid fa-circle" style="font-size:0.6rem;color:#22c55e;margin-right:5px"></i>Online</span>
        </div>
        <div class="chat-page-messages" id="chat-page-messages">
          <div class="chat-page-loading" id="chat-page-loading"><i class="fa-solid fa-spinner fa-spin"></i> Loading chat...</div>
        </div>
        <div class="chat-page-input-wrap" id="chat-page-input-wrap">
          <input type="text" id="chat-page-input" class="chat-page-input" placeholder="Type your message here..." maxlength="1000">
          <button class="chat-page-send" id="chat-page-send-btn"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
        <div class="chat-page-login" id="chat-page-login" style="display:none">
          <i class="fa-solid fa-headset" style="font-size:3rem;color:var(--text-gray);margin-bottom:15px"></i>
          <h3>Sign in to Chat</h3>
          <p>Please sign in with Google to start a conversation with our support team.</p>
          <div id="chat-google-btn"></div>
        </div>
      </div>
    </div>
  </section>

  <div class="payment-toast" id="payment-toast" style="display:none">
    <div class="payment-toast-content">
      <i class="fa-solid" id="payment-toast-icon"></i>
      <div>
        <h4 id="payment-toast-title"></h4>
        <p id="payment-toast-msg"></p>
      </div>
      <i class="fa-solid fa-xmark payment-toast-close" id="payment-toast-close"></i>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="/js/app.js"></script>
  <script src="/js/chat.js"></script>
</body>
</html>
